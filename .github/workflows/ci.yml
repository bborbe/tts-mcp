name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    # Apple Silicon runner: mlx-audio (MLX/Metal) and sounddevice (PortAudio) are
    # macOS/arm64-only, and src/ imports them at module load, so tests need them installed.
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PortAudio (sounddevice native dependency)
        run: brew install portaudio

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run precommit checks
        run: make precommit
